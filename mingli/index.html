<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星轨 - 传统命理与数据可视化</title>
    <script
      src="https://cdn.tailwindcss.com"
      onerror="this.onerror=null;this.src='./libs/tailwindcss.min.js';"
    ></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              deep: "#070A12",
              ink: "#0B1220",
              "ink-2": "#0E1730",
              mist: "rgba(255,255,255,0.08)",
              "mist-2": "rgba(255,255,255,0.12)",
            },
            boxShadow: {
              glow: "0 0 18px rgba(120, 119, 198, 0.28)",
            },
          },
        },
      };
    </script>
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
      onerror="this.onerror=null;this.src='./libs/react.production.min.js';"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
      onerror="this.onerror=null;this.src='./libs/react-dom.production.min.js';"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone/babel.min.js"
      onerror="this.onerror=null;this.src='./libs/babel.min.js';"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"
      onerror="this.onerror=null;this.src='./libs/echarts.min.js';"
    ></script>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        height: 100%;
      }
      body {
        background: radial-gradient(1200px 700px at 10% -10%, rgba(120, 119, 198, 0.28), transparent 55%),
          radial-gradient(900px 540px at 90% 0%, rgba(60, 210, 255, 0.18), transparent 50%),
          radial-gradient(900px 520px at 40% 110%, rgba(255, 153, 102, 0.12), transparent 55%),
          linear-gradient(180deg, #060814 0%, #070A12 55%, #050713 100%);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial,
          "Noto Sans", "Liberation Sans", sans-serif;
      }
      .stars {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image: radial-gradient(rgba(255, 255, 255, 0.35) 1px, transparent 1px);
        background-size: 55px 55px;
        opacity: 0.08;
        transform: translateZ(0);
      }
      .stars::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image: radial-gradient(rgba(160, 193, 255, 0.55) 1px, transparent 1px);
        background-size: 90px 90px;
        opacity: 0.16;
      }
      .glass {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.04));
        border: 1px solid rgba(255, 255, 255, 0.10);
        box-shadow: 0 0 22px rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(10px);
      }
      .card {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.03));
        border: 1px solid rgba(255, 255, 255, 0.10);
      }
      .focus-ring:focus {
        outline: none;
        box-shadow: 0 0 0 3px rgba(110, 168, 255, 0.22);
        border-color: rgba(110, 168, 255, 0.5) !important;
      }
      .skeleton {
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.05));
        background-size: 220% 100%;
        animation: shimmer 1.1s infinite linear;
      }
      @keyframes shimmer {
        0% {
          background-position: 0% 50%;
        }
        100% {
          background-position: 220% 50%;
        }
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }
      /* 修复暗色主题下原生下拉展开后选项不可见（白底白字） */
      select option {
        color: #0f172a;
        background: #ffffff;
      }
      select option:checked {
        color: #0f172a;
        background: #dbeafe;
      }
      .status-card {
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        border-radius: 1.2rem;
      }
      @media (max-width: 768px) {
        .glass {
          backdrop-filter: blur(6px);
          box-shadow: 0 0 12px rgba(0, 0, 0, 0.2);
        }
        .stars {
          opacity: 0.05;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .skeleton {
          animation: none;
        }
      }
    </style>
  </head>
  <body class="dark">
    <div class="stars"></div>
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;

      const zodiac = [
        { key: "Rat", cn: "鼠", en: "Rat" },
        { key: "Ox", cn: "牛", en: "Ox" },
        { key: "Tiger", cn: "虎", en: "Tiger" },
        { key: "Rabbit", cn: "兔", en: "Rabbit" },
        { key: "Loong", cn: "龙", en: "Loong" }, // 禁止用 Dragon
        { key: "Snake", cn: "蛇", en: "Snake" },
        { key: "Horse", cn: "马", en: "Horse" },
        { key: "Goat", cn: "羊", en: "Goat" },
        { key: "Monkey", cn: "猴", en: "Monkey" },
        { key: "Rooster", cn: "鸡", en: "Rooster" },
        { key: "Dog", cn: "狗", en: "Dog" },
        { key: "Pig", cn: "猪", en: "Pig" },
      ];

      const zodiacImagePath = (enKey) => `assets/Images/${enKey}.png`; // 图片路径首字母必须大写；龙用 Loong

      const ZODIAC_SPECIALTY = {
        Rat: "灵敏与资源整合",
        Ox: "稳健与长期积累",
        Tiger: "果断与爆发成长",
        Rabbit: "细腻与秩序感",
        Loong: "格局与突破潜能",
        Snake: "洞察与策略运用",
        Horse: "行动与节奏把控",
        Goat: "温和与共情连接",
        Monkey: "学习与变化适应",
        Rooster: "标准与结果导向",
        Dog: "忠诚与守护体系",
        Pig: "包容与富足承载",
      };

      function cx(...parts) {
        return parts.filter(Boolean).join(" ");
      }

      function formatMoney(n) {
        const num = Number(n || 0);
        return "¥" + num.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, "$&,");
      }

      // ECharts 可能因网络波动导致 CDN 加载失败，这里提供动态加载与重试能力。
      function loadEcharts(forceReload) {
        if (window.echarts && !forceReload) return Promise.resolve(window.echarts);
        if (!forceReload && window.__ECHARTS_PROMISE__) return window.__ECHARTS_PROMISE__;

        window.__ECHARTS_PROMISE__ = new Promise((resolve, reject) => {
          const urls = [
            // 主：jsdelivr
            "https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js",
            // 备：cdnjs
            "https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.1/echarts.min.js",
            // 本地兜底
            "./libs/echarts.min.js",
          ];
          let i = 0;

          const tryNext = () => {
            if (i >= urls.length) {
              reject(new Error("ECharts加载失败：CDN 与本地兜底均不可用"));
              return;
            }
            const url = urls[i++];
            const s = document.createElement("script");
            s.src = url;
            s.async = true;
            s.onload = () => {
              if (window.echarts) resolve(window.echarts);
              else reject(new Error("ECharts脚本加载完成但全局变量 echarts 不存在"));
            };
            s.onerror = () => tryNext();
            document.head.appendChild(s);
          };

          tryNext();
        });

        return window.__ECHARTS_PROMISE__;
      }

      function useHashRoute(defaultPage) {
        const [page, setPage] = useState(defaultPage);
        useEffect(() => {
          const h = (window.location.hash || "").replace("#", "");
          if (h) setPage(h);
        }, []);
        useEffect(() => {
          window.location.hash = page;
        }, [page]);
        return [page, setPage];
      }

      function ToastHost({ toast, onDismiss }) {
        useEffect(() => {
          if (!toast) return;
          const t = setTimeout(() => onDismiss?.(), toast.durationMs ?? 2600);
          return () => clearTimeout(t);
        }, [toast, onDismiss]);
        if (!toast) return null;
        return (
          <div className="fixed top-4 right-4 z-50">
            <div className="glass px-4 py-3 rounded-xl min-w-[260px]">
              <div className="flex items-start gap-3">
                <div className="w-2.5 h-2.5 rounded-full bg-sky-400 mt-2.5 shadow-glow"></div>
                <div>
                  <div className="text-sm text-white/90 font-semibold">{toast.title}</div>
                  <div className="text-xs text-white/70 mt-0.5">{toast.message}</div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      function EmptyState({ title, description, actionText, onAction }) {
        return (
          <div className="status-card p-5 text-center">
            <div className="text-sm font-semibold">{title}</div>
            <div className="text-xs text-white/60 mt-1 leading-relaxed">{description}</div>
            {actionText && onAction ? (
              <button
                className="mt-4 px-4 py-2 rounded-2xl border border-white/10 bg-white/5 hover:bg-white/10 focus-ring text-xs font-semibold"
                onClick={onAction}
              >
                {actionText}
              </button>
            ) : null}
          </div>
        );
      }

      function InlineAlert({ title, description, actionText, onAction }) {
        return (
          <div className="status-card p-4">
            <div className="text-sm font-semibold">{title}</div>
            {description ? <div className="text-xs text-white/60 mt-1 leading-relaxed">{description}</div> : null}
            {actionText && onAction ? (
              <button
                className="mt-3 px-4 py-2 rounded-2xl border border-white/10 bg-white/5 hover:bg-white/10 focus-ring text-xs font-semibold"
                onClick={onAction}
              >
                {actionText}
              </button>
            ) : null}
          </div>
        );
      }

      function OptionGrid({ options, value, onChange, columns = 3 }) {
        const colClass =
          columns === 2
            ? "grid grid-cols-2 gap-2"
            : columns === 4
            ? "grid grid-cols-2 md:grid-cols-4 gap-2"
            : "grid grid-cols-2 md:grid-cols-3 gap-2";
        return (
          <div className={colClass}>
            {options.map((opt) => {
              const active = opt.value === value;
              return (
                <button
                  key={opt.value}
                  type="button"
                  className={cx(
                    "px-3 py-2 rounded-2xl border text-xs text-left focus-ring transition",
                    active
                      ? "bg-white/12 border-white/25 shadow-glow text-white"
                      : "bg-white/5 border-white/10 hover:bg-white/10 text-white/85"
                  )}
                  onClick={() => onChange(opt.value)}
                >
                  {opt.label}
                </button>
              );
            })}
          </div>
        );
      }

      function AppLayout({ children, page, setPage, menu, selectedMaster, setSelectedMaster }) {
        const [open, setOpen] = useState(false);
        useEffect(() => setOpen(false), [page]);
        return (
          <div className="min-h-screen text-white">
            <header className="sticky top-0 z-40">
              <div className="bg-black/25 backdrop-blur-xl border-b border-white/10">
                <div className="max-w-[1280px] mx-auto px-4 py-3 flex items-center justify-between gap-3">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-2xl bg-gradient-to-br from-indigo-500/35 to-cyan-400/20 border border-white/10 flex items-center justify-center shadow-glow">
                      <span className="mono text-xs font-bold text-white/90">星轨</span>
                    </div>
                    <div>
                      <div className="text-sm font-semibold tracking-wide">传统命理与数据可视化</div>
                      <div className="text-xs text-white/60">严谨叙事 + 可视化洞察</div>
                    </div>
                  </div>

                  <div className="flex items-center gap-2">
                    <button
                      className="md:hidden px-3 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 focus-ring"
                      onClick={() => setOpen((v) => !v)}
                    >
                      <span className="text-xs">{open ? "收起菜单" : "打开菜单"}</span>
                    </button>
                    <button
                      className="hidden md:inline-flex px-3 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 focus-ring"
                      onClick={() => setPage("bazi")}
                    >
                      <span className="text-xs font-semibold">开始排盘</span>
                    </button>
                    <div className="hidden md:block text-right">
                      <div className="text-xs text-white/60">当前页</div>
                      <div className="text-sm font-semibold">{menu.find((m) => m.id === page)?.label || "系统"}</div>
                    </div>
                  </div>
                </div>
              </div>
            </header>

            <div className="max-w-[1280px] mx-auto px-4 py-6 flex gap-5">
              <aside className={cx("shrink-0 hidden md:block w-[270px]", " ")}
              >
                <div className="glass rounded-3xl p-4">
                  <div className="text-xs text-white/60 mb-3">导航</div>
                  <nav className="space-y-1">
                    {menu.map((item) => {
                      const active = item.id === page;
                      return (
                        <button
                          key={item.id}
                          onClick={() => setPage(item.id)}
                          className={cx(
                            "w-full text-left rounded-2xl px-3 py-2 transition border focus-ring",
                            active
                              ? "bg-gradient-to-r from-indigo-500/25 to-cyan-400/15 border-white/20 shadow-glow"
                              : "bg-white/0 border-transparent hover:bg-white/5 hover:border-white/10"
                          )}
                        >
                          <div className="flex items-center justify-between gap-3">
                            <div className="text-sm font-semibold">{item.label}</div>
                            {active ? <div className="w-2 h-2 rounded-full bg-cyan-300 shadow-glow" /> : <div className="w-2 h-2 rounded-full bg-white/20" />}
                          </div>
                        </button>
                      );
                    })}
                  </nav>
                  <div className="mt-4 pt-4 border-t border-white/10">
                    <div className="text-xs text-white/60 mb-2">快速入口</div>
                    <div className="grid grid-cols-2 gap-2">
                      <button
                        className="px-3 py-2 rounded-2xl border border-white/10 bg-white/5 hover:bg-white/10 focus-ring"
                        onClick={() => setPage("kline")}
                      >
                        <div className="text-xs font-semibold">人生K线</div>
                        <div className="text-[11px] text-white/60 mt-0.5">动态绘制</div>
                      </button>
                      <button
                        className="px-3 py-2 rounded-2xl border border-white/10 bg-white/5 hover:bg-white/10 focus-ring"
                        onClick={() => setPage("center")}
                      >
                        <div className="text-xs font-semibold">个人中心</div>
                        <div className="text-[11px] text-white/60 mt-0.5">查看记录</div>
                      </button>
                    </div>
                  </div>

                  <div className="mt-4 text-[11px] text-white/45 leading-relaxed">
                    提示：当前版本为前端单文件交付版本，核心流程可直接体验。
                  </div>
                </div>
              </aside>

              {open ? (
                <div className="md:hidden fixed inset-0 z-40" onClick={() => setOpen(false)}>
                  <div className="absolute inset-0 bg-black/40"></div>
                  <div className="absolute left-3 right-3 top-20 glass rounded-3xl p-4 max-h-[80vh] overflow-auto">
                    <div className="text-xs text-white/60 mb-3">导航</div>
                    <nav className="space-y-1">
                      {menu.map((item) => {
                        const active = item.id === page;
                        return (
                          <button
                            key={item.id}
                            onClick={() => setPage(item.id)}
                            className={cx(
                              "w-full text-left rounded-2xl px-3 py-2 transition border focus-ring",
                              active
                                ? "bg-gradient-to-r from-indigo-500/25 to-cyan-400/15 border-white/20 shadow-glow"
                                : "bg-white/0 border-transparent hover:bg-white/5 hover:border-white/10"
                            )}
                          >
                            <div className="flex items-center justify-between gap-3">
                              <div className="text-sm font-semibold">{item.label}</div>
                              {active ? <div className="w-2 h-2 rounded-full bg-cyan-300 shadow-glow" /> : <div className="w-2 h-2 rounded-full bg-white/20" />}
                            </div>
                          </button>
                        );
                      })}
                    </nav>
                  </div>
                </div>
              ) : null}

              <main className="flex-1">{children}</main>
            </div>

            <footer className="py-10 mt-4">
              <div className="max-w-[1280px] mx-auto px-4">
                <div className="text-center text-xs text-white/45 leading-relaxed">
                  星轨 · 命理分析与趋势洞察平台
                  <div className="mt-1">© {new Date().getFullYear()} 星轨 · 内容仅供文化参考</div>
                </div>
              </div>
            </footer>
          </div>
        );
      }

      function PageShell({ title, subtitle, children, right }) {
        return (
          <section className="space-y-4">
            <div className="flex items-start justify-between gap-4">
              <div>
                <div className="text-xs text-white/60">{subtitle || "严谨的命理叙事与工程化呈现"}</div>
                <h1 className="text-xl md:text-2xl font-bold tracking-wide mt-1">{title}</h1>
              </div>
              {right ? <div className="shrink-0">{right}</div> : null}
            </div>
            {children}
          </section>
        );
      }

      function SystemHome({ setPage }) {
        const [selected, setSelected] = useState(zodiac[4]); // Loong 默认
        const selectedPath = zodiacImagePath(selected.en);
        return (
          <PageShell
            title="系统首页"
            subtitle="生肖图腾展示 + 入口总览"
            right={
              <div className="card rounded-3xl px-4 py-3">
                <div className="text-xs text-white/60">今日摘要</div>
                <div className="text-sm font-semibold mt-1">以“测—证—用”为逻辑闭环</div>
                <div className="text-[11px] text-white/60 mt-1 leading-relaxed">
                  以图表辅助理解，以叙事框架解释变量影响。
                </div>
              </div>
            }
          >
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-5">
              <div className="lg:col-span-7 card rounded-3xl p-5">
                <div className="flex items-center justify-between gap-3">
                  <div>
                    <div className="text-sm font-semibold">生肖图腾展示位</div>
                    <div className="text-xs text-white/60 mt-1">点击选择：生肖图腾图片素材路径</div>
                  </div>
                  <button className="px-3 py-2 rounded-2xl border border-white/10 bg-white/5 hover:bg-white/10 focus-ring text-xs font-semibold" onClick={() => setPage("bazi")}>
                    去排盘
                  </button>
                </div>

                <div className="mt-5 grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
                  {zodiac.map((z) => {
                    const active = z.key === selected.key;
                    return (
                      <button
                        key={z.key}
                        onClick={() => setSelected(z)}
                        className={cx(
                          "rounded-3xl p-3 text-left border focus-ring transition",
                          active ? "border-white/25 bg-white/7 shadow-glow" : "border-white/10 bg-white/0 hover:bg-white/5"
                        )}
                      >
                        <div className="flex items-center gap-3">
                          <div className="w-10 h-10 rounded-2xl overflow-hidden border border-white/10 bg-black/20 flex items-center justify-center">
                            {active ? (
                              <img
                                src={zodiacImagePath(z.en)}
                                alt={z.en}
                                className="w-full h-full object-cover"
                                loading="lazy"
                                onError={(e) => {
                                  e.currentTarget.style.display = "none";
                                  const parent = e.currentTarget.parentElement;
                                  if (parent) parent.style.background = "rgba(255,255,255,0.06)";
                                }}
                              />
                            ) : (
                              <div className="text-xs text-white/55 mono">{z.cn}</div>
                            )}
                          </div>
                          <div>
                            <div className="text-sm font-bold">{z.cn}</div>
                            <div className="text-[11px] text-white/55 mono">{z.en}</div>
                          </div>
                        </div>
                      </button>
                    );
                  })}
                </div>

                <div className="mt-5 card rounded-3xl p-4">
                  <div className="flex items-center justify-between gap-4">
                    <div className="flex items-center gap-4">
                      <div className="w-16 h-16 rounded-3xl overflow-hidden border border-white/10 bg-black/20 flex items-center justify-center">
                        <img
                          src={selectedPath}
                          alt={selected.en}
                          className="w-full h-full object-cover"
                          loading="lazy"
                          decoding="async"
                          onError={(e) => {
                            e.currentTarget.style.display = "none";
                            const parent = e.currentTarget.parentElement;
                            if (parent) parent.style.background = "rgba(120,119,198,0.12)";
                          }}
                        />
                      </div>
                      <div>
                        <div className="text-sm font-semibold">{selected.cn} · {selected.en}</div>
                        <div className="text-xs text-white/60 mt-1">偏向：{ZODIAC_SPECIALTY[selected.en]}</div>
                      </div>
                    </div>
                    <div className="text-right">
                      <div className="text-xs text-white/60">推荐动作</div>
                      <div className="text-sm font-semibold mt-1">先看“人生K线”再做排盘校准</div>
                    </div>
                  </div>
                  <div className="mt-4 flex gap-2">
                    <button className="flex-1 px-3 py-2 rounded-2xl border border-white/10 bg-white/5 hover:bg-white/10 focus-ring text-xs font-semibold" onClick={() => setPage("kline")}>
                      查看人生K线图
                    </button>
                    <button className="flex-1 px-3 py-2 rounded-2xl border border-white/10 bg-white/5 hover:bg-white/10 focus-ring text-xs font-semibold" onClick={() => setPage("guide")}>
                      看引导页
                    </button>
                  </div>
                </div>
              </div>

              <div className="lg:col-span-5 space-y-5">
                <div className="card rounded-3xl p-5">
                  <div className="text-sm font-semibold">核心模块</div>
                  <div className="text-xs text-white/60 mt-1">用可视化把传统变量“工程化”表达</div>
                  <div className="mt-4 grid grid-cols-1 gap-2">
                    {[

      function KlinePage({ pushToast }) {
        const domRef = useRef(null);
        const chartRef = useRef(null);
        const pausedRef = useRef(false);
        const speedRef = useRef(1);
        const [ready, setReady] = useState(false);
        const [loadState, setLoadState] = useState("loading"); // loading | ready | error
        const [reloadKey, setReloadKey] = useState(0);
        const [isPaused, setIsPaused] = useState(false);
        const [speed, setSpeed] = useState(1);
        const [progressPct, setProgressPct] = useState(0);

        useEffect(() => {
          pausedRef.current = isPaused;
        }, [isPaused]);

        useEffect(() => {
          speedRef.current = speed;
        }, [speed]);

        // 预置：年份与运势值（用于图表渲染）
        const fullData = useMemo(() => {
          const start = 1990;
          const end = 2025;
          const years = [];
          const values = [];
          let v = 55;
          for (let y = start; y <= end; y++) {
            years.push(String(y));
            const t = (y - start) / (end - start);
            const wave = Math.sin(t * Math.PI * 5) * 12 + Math.cos(t * Math.PI * 2) * 6;
            const trend = t * 18 - 6;
            v = 60 + trend + wave;
            values.push(Math.max(5, Math.min(95, Number(v.toFixed(2)))));
          }
          return years.map((year, i) => ({ year, value: values[i] }));
        }, []);

        const dataPairs = useMemo(() => fullData.map((d) => [d.year, d.value]), [fullData]);

        useEffect(() => {
          if (!domRef.current) return;
          let disposed = false;
          let inst = null;
          let rafId = 0;
          let resize = null;
          let resizeRaf = 0;

          const init = async () => {
            setLoadState("loading");
            setReady(false);
            setProgressPct(0);

            try {
              const echartsLib = await loadEcharts(false);
              if (disposed) return;

              inst = echartsLib.init(domRef.current, null, { useDirtyRect: true });
              chartRef.current = inst;

              const totalDurationMs = 30000; // 默认 1x 速度下仍为 30 秒
              const totalPoints = fullData.length;
              const initialCount = Math.min(3, totalPoints);
              let drawnMs = 0;
              let lastFrameTs = performance.now();

              const optionBase = {
                backgroundColor: "transparent",
                grid: { left: 42, right: 24, top: 40, bottom: 34, containLabel: true },
                tooltip: {
                  trigger: "axis",
                  backgroundColor: "rgba(2, 6, 23, 0.86)",
                  borderColor: "rgba(255,255,255,0.12)",
                  borderWidth: 1,
                  textStyle: { color: "rgba(255,255,255,0.92)" },
                  formatter: (params) => {
                    const p = params?.[0];
                    if (!p) return "";
                    return `${p.axisValueLabel}<br/>运势：${Number(p.data[1]).toFixed(2)}`;
                  },
                },
                xAxis: {
                  type: "category",
                  data: fullData.map((d) => d.year),
                  axisLine: { lineStyle: { color: "rgba(255,255,255,0.20)" } },
                  axisLabel: { color: "rgba(255,255,255,0.65)", fontSize: 11 },
                  axisTick: { alignWithLabel: true },
                },
                yAxis: {
                  type: "value",
                  min: 0,
                  max: 100,
                  splitLine: { lineStyle: { color: "rgba(255,255,255,0.10)" } },
                  axisLine: { show: true, lineStyle: { color: "rgba(255,255,255,0.20)" } },
                  axisLabel: { color: "rgba(255,255,255,0.65)", fontSize: 11 },
                },
                series: [
                  {
                    name: "运势曲线",
                    type: "line",
                    smooth: true,
                    symbol: "circle",
                    symbolSize: 7,
                    showSymbol: false,
                    lineStyle: {
                      width: 3,
                      color: "rgba(120, 119, 198, 0.95)",
                    },
                    emphasis: {
                      focus: "series",
                    },
                    data: dataPairs.slice(0, initialCount),
                    areaStyle: {
                      opacity: 0.12,
                      color: "rgba(120, 119, 198, 0.45)",
                    },
                    animation: false,
                  },
                ],
              };

              inst.setOption(optionBase, { notMerge: true, lazyUpdate: true });
              setReady(true);
              setLoadState("ready");

              let lastIndex = initialCount;
              setProgressPct((initialCount / totalPoints) * 100);

              const tick = () => {
                const now = performance.now();
                const delta = now - lastFrameTs;
                lastFrameTs = now;

                if (!pausedRef.current) {
                  drawnMs += delta * speedRef.current;
                }

                const progress = Math.min(1, drawnMs / totalDurationMs);
                const currentIndex = Math.max(initialCount, Math.floor(progress * totalPoints));

                if (currentIndex !== lastIndex) {
                  lastIndex = currentIndex;
                  inst.setOption(
                    {
                      series: [
                        {
                          data: dataPairs.slice(0, currentIndex),
                        },
                      ],
                    },
                    { notMerge: false, lazyUpdate: true }
                  );
                  setProgressPct((currentIndex / totalPoints) * 100);
                }

                if (progress < 1) {
                  rafId = requestAnimationFrame(tick);
                } else {
                  setProgressPct(100);
                  pushToast?.({
                    title: "绘制完成",
                    message: "人生K线图已完成从左到右动态绘制。",
                    durationMs: 3200,
                  });
                }
              };

              resize = () => {
                if (resizeRaf) return;
                resizeRaf = requestAnimationFrame(() => {
                  resizeRaf = 0;
                  inst?.resize();
                });
              };
              window.addEventListener("resize", resize);
              rafId = requestAnimationFrame(tick);
            } catch (e) {
              if (disposed) return;
              setLoadState("error");
              setReady(false);
              pushToast?.({
                title: "ECharts加载失败",
                message: "可能是网络超时。请稍后重试或检查本地库文件。",
                durationMs: 3800,
              });
            }
          };

          init();

          return () => {
            disposed = true;
            if (resize) window.removeEventListener("resize", resize);
            if (resizeRaf) cancelAnimationFrame(resizeRaf);
            cancelAnimationFrame(rafId);
            if (chartRef.current) chartRef.current.dispose();
            chartRef.current = null;
          };
        }, [fullData, pushToast, dataPairs, reloadKey]);

        return (
          <PageShell
            title="人生K线图"
            subtitle="ECharts 持续 30 秒缓慢动态从左到右绘制"
            right={
              <div className="card rounded-3xl px-4 py-3">
                <div className="text-xs text-white/60">动画说明</div>
                <div className="text-sm font-semibold mt-1">逐步追加点位，累计时长 30000ms</div>
              </div>
            }
          >
            <div className="card rounded-3xl p-5">
              <div className="flex items-start justify-between gap-4">
                <div>
                  <div className="text-sm font-semibold">趋势与转折</div>
                  <div className="text-xs text-white/60 mt-1 leading-relaxed">
                    横轴为年份，纵轴为运势强度（0-100）。曲线在 30 秒内逐步展开，便于观察拐点与区间段。
                  </div>
                </div>
                <div className="shrink-0 text-right">
                  <div className="text-xs text-white/60">加载状态</div>
                  <div className="mt-1 text-sm font-semibold">{ready ? "已初始化" : "初始化中"}</div>
                  <div className="text-[11px] text-white/60 mt-0.5">ECharts 绘图中</div>
                </div>
              </div>

              <div className="mt-4 card rounded-3xl p-4">
                <div className="flex flex-wrap items-center gap-2">
                  <button
                    className="px-3 py-2 rounded-2xl border border-white/10 bg-white/5 hover:bg-white/10 focus-ring text-xs font-semibold"
                    onClick={() => setIsPaused((v) => !v)}
                    disabled={loadState !== "ready"}
                  >
                    {isPaused ? "继续" : "暂停"}
                  </button>
                  <button
                    className="px-3 py-2 rounded-2xl border border-white/10 bg-white/5 hover:bg-white/10 focus-ring text-xs font-semibold"
                    onClick={() => {
                      setIsPaused(false);
                      setReloadKey((k) => k + 1);
                    }}
                  >
                    重播
                  </button>
                  {[0.5, 1, 1.5, 2].map((sp) => (
                    <button
                      key={sp}
                      className={cx(
                        "px-3 py-2 rounded-2xl border focus-ring text-xs font-semibold",
                        speed === sp ? "bg-white/12 border-white/20" : "bg-white/5 border-white/10 hover:bg-white/10"
                      )}
                      onClick={() => setSpeed(sp)}
                    >
                      {sp}x
                    </button>
                  ))}
                  <div className="ml-auto text-xs text-white/60">进度 {Math.round(progressPct)}%</div>
                </div>
                <div className="mt-3 h-2 rounded-full bg-white/6 border border-white/10 overflow-hidden">
                  <div className="h-full bg-gradient-to-r from-indigo-500/60 to-cyan-400/45" style={{ width: `${progressPct}%` }}></div>
                </div>
              </div>

              <div className="mt-4">
                <div ref={domRef} className="w-full h-[420px] rounded-3xl overflow-hidden border border-white/10 bg-black/20"></div>
              </div>

              {loadState === "error" ? (
                <div className="mt-4">
                  <InlineAlert
                    title="图表未加载出来"
                    description="ECharts 资源加载失败。可先检查网络，或将库文件放到 ./libs 后重试。"
                    actionText="重试加载"
                    onAction={() => {
                      loadEcharts(true)
                        .then(() => {
                          setReloadKey((k) => k + 1);
                          pushToast?.({ title: "重试成功", message: "正在初始化 K 线图。", durationMs: 2300 });
                        })
                        .catch(() => {
                          pushToast?.({ title: "重试失败", message: "仍无法加载 ECharts，请检查网络。", durationMs: 3200 });
                        });
                    }}
                  />
                </div>
              ) : null}

              <div className="mt-4 grid grid-cols-1 md:grid-cols-3 gap-3">
                {[
                  { k: "区间段", v: "把曲线拆解为连续阶段，强调“过程”的可解释性。" },
                  { k: "转折点", v: "重点关注局部上升/回落，作为决策提醒。" },
                  { k: "行动建议", v: "趋势不等于确定性：建议结合排盘输入校准。" },
                ].map((it) => (
                  <div key={it.k} className="card rounded-3xl p-4">
                    <div className="text-xs text-white/60">{it.k}</div>
                    <div className="text-sm font-semibold mt-1">{it.v}</div>
                  </div>
                ))}
              </div>
            </div>
          </PageShell>
        );
      }

                        className={cx(
                          "px-3 py-2 rounded-2xl border text-xs font-semibold focus-ring",
                          useTrueSun ? "bg-white/10 border-white/20" : "bg-white/0 border-white/10"
                        )}
                        onClick={() => setUseTrueSun((v) => !v)}
                      >
                        真太阳时：{useTrueSun ? "采用" : "不采用"}
                      </button>
                    </div>
                  </div>

                  <div className="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                      <label className="text-xs text-white/65">日历体系</label>
                      <select
                        className="mt-2 w-full px-3 py-2 rounded-2xl border border-white/10 bg-white/5 focus-ring"
                        value={dateMode}
                        onChange={(e) => setDateMode(e.target.value)}
                      >
                        <option value="solar">公历（Solar）</option>
                        <option value="lunar">农历（Lunar）</option>
                      </select>
                      {dateMode === "lunar" ? (
                        <div className="mt-3">
                          <label className="text-xs text-white/65">是否闰月</label>
                          <select
                            className="mt-2 w-full px-3 py-2 rounded-2xl border border-white/10 bg-white/5 focus-ring"
                            value={leapMonth}
                            onChange={(e) => setLeapMonth(e.target.value)}
                          >
                            <option value="no">非闰月</option>
                            <option value="yes">闰月</option>
                          </select>
                        </div>
                      ) : null}
                    </div>

                    <div>
                      <label className="text-xs text-white/65">时区</label>
                      <select
                        className="mt-2 w-full px-3 py-2 rounded-2xl border border-white/10 bg-white/5 focus-ring"
                        value={timezone}
                        onChange={(e) => setTimezone(e.target.value)}
                      >
                        <option value="Asia/Shanghai">Asia/Shanghai（北京时间）</option>
                        <option value="Asia/Hong_Kong">Asia/Hong_Kong</option>
                        <option value="Asia/Tokyo">Asia/Tokyo</option>
                        <option value="Asia/Seoul">Asia/Seoul</option>
                        <option value="UTC">UTC</option>
                      </select>
                      <div className="mt-3">
                        <label className="text-xs text-white/65">时辰（简化分支）</label>
                        <select
                          className="mt-2 w-full px-3 py-2 rounded-2xl border border-white/10 bg-white/5 focus-ring"
                          value={hourBranch}
                          onChange={(e) => setHourBranch(e.target.value)}
                        >
                          <option value="Zi">Zi 子时</option>
                          <option value="Chou">Chou 丑时</option>
                          <option value="Yin">Yin 寅时</option>
                          <option value="Mao">Mao 卯时</option>
                          <option value="Chen">Chen 辰时</option>
                          <option value="Si">Si 巳时</option>
                          <option value="Wu">Wu 午时</option>
                          <option value="Wei">Wei 未时</option>
                          <option value="Shen">Shen 申时</option>
                          <option value="You">You 酉时</option>
                          <option value="Xu">Xu 戌时</option>
                          <option value="Hai">Hai 亥时</option>
                        </select>
                      </div>
                    </div>
                  </div>

                  <div className="mt-4 grid grid-cols-1 sm:grid-cols-4 gap-3">
                    <div>
                      <label className="text-xs text-white/65">年份</label>
                      <select
                        className="mt-2 w-full px-3 py-2 rounded-2xl border border-white/10 bg-white/5 focus-ring"
                        value={year}
                        onChange={(e) => setYear(e.target.value)}
                      >
                        {yearRange.map((y) => (
                          <option key={y} value={y}>
                            {y}
                          </option>
                        ))}
                      </select>
                    </div>
                    <div>
                      <label className="text-xs text-white/65">月份</label>
                      <select
                        className="mt-2 w-full px-3 py-2 rounded-2xl border border-white/10 bg-white/5 focus-ring"
                        value={month}
                        onChange={(e) => setMonth(e.target.value)}
                      >
                        {Array.from({ length: 12 }).map((_, i) => {
                          const m = String(i + 1).padStart(2, "0");
                          return (
                            <option key={m} value={m}>
                              {m}
                            </option>
                          );
                        })}
                      </select>
                    </div>
                    <div>
                      <label className="text-xs text-white/65">日期</label>
                      <select
                        className="mt-2 w-full px-3 py-2 rounded-2xl border border-white/10 bg-white/5 focus-ring"
                        value={day}
                        onChange={(e) => setDay(e.target.value)}
                      >
                        {dayOptions.map((d) => (
                          <option key={d} value={d}>
                            {d}
                          </option>
                        ))}
                      </select>
                      <div className="text-[11px] text-white/55 mt-1">动态校验：该月 {daysInMonth} 天</div>
                    </div>
                    <div>
                      <label className="text-xs text-white/65">时间</label>
                      <div className="mt-2 grid grid-cols-2 gap-2">
                        <select
                          className="px-3 py-2 rounded-2xl border border-white/10 bg-white/5 focus-ring"
                          value={hour}
                          onChange={(e) => setHour(e.target.value)}
                        >
                          {Array.from({ length: 24 }).map((_, i) => {
                            const h = String(i).padStart(2, "0");
                            return (
                              <option key={h} value={h}>
                                {h}
                              </option>
                            );
                          })}
                        </select>
                        <select
                          className="px-3 py-2 rounded-2xl border border-white/10 bg-white/5 focus-ring"
                          value={minute}
                          onChange={(e) => setMinute(e.target.value)}
                        >
                          {Array.from({ length: 60 }).filter((x) => x % 5 === 0).map((_, i) => {
                            const mm = String(i * 5).padStart(2, "0");
                            return (
                              <option key={mm} value={mm}>
                                {mm}
                              </option>
                            );
                          })}
                        </select>
                      </div>
                      <div className="text-[11px] text-white/55 mt-1">分钟粒度：5 分钟</div>
                    </div>
                  </div>
                </div>

                <div className="mt-5 grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div>
                    <label className="text-xs text-white/65">排盘方式</label>
                    <select
                      className="mt-2 w-full px-3 py-2 rounded-2xl border border-white/10 bg-white/5 focus-ring"
                      value={baziMethod}
                      onChange={(e) => setBaziMethod(e.target.value)}
                    >
                      <option value="traditional">传统排盘（偏叙事）</option>
                      <option value="modern">现代算法（偏量化）</option>
                      <option value="verified">大师校准（偏一致性校验）</option>
                    </select>
                  </div>
                  <div className="md:col-span-2">
                    <label className="text-xs text-white/65">主要咨询主题（全部展示）</label>
                    <div className="mt-2">
                      <OptionGrid options={consultTopicOptions} value={consultTopic} onChange={setConsultTopic} columns={3} />
                    </div>
                  </div>
                  <div className="md:col-span-2">
                    <label className="text-xs text-white/65">当前行业（全部展示）</label>
                    <div className="mt-2">
                      <OptionGrid options={industryOptions} value={industry} onChange={setIndustry} columns={3} />
                    </div>
                  </div>
                  <div>
                    <label className="text-xs text-white/65">婚恋状态（全部展示）</label>
                    <div className="mt-2">
                      <OptionGrid options={maritalOptions} value={maritalStatus} onChange={setMaritalStatus} columns={2} />
                    </div>
                  </div>
                  <div>
                    <label className="text-xs text-white/65">最高学历（全部展示）</label>
                    <div className="mt-2">
                      <OptionGrid options={educationOptions} value={educationLevel} onChange={setEducationLevel} columns={2} />
                    </div>
                  </div>
                  <div>
                    <label className="text-xs text-white/65">子女规划（全部展示）</label>
                    <div className="mt-2">
                      <OptionGrid options={childrenPlanOptions} value={childrenPlan} onChange={setChildrenPlan} columns={2} />
                    </div>
                  </div>
                  <div>
                    <label className="text-xs text-white/65">健康关注方向（全部展示）</label>
                    <div className="mt-2">
                      <OptionGrid options={healthOptions} value={healthFocus} onChange={setHealthFocus} columns={2} />
                    </div>
                  </div>
                  <div className="flex items-end">
                    <button
                      className="w-full px-4 py-3 rounded-2xl bg-gradient-to-r from-indigo-500/35 to-cyan-400/25 border border-white/10 hover:bg-gradient-to-r from-indigo-500/45 to-cyan-400/35 focus-ring font-semibold"
                      onClick={() => {
                        const draft = buildDraft();
                        pushToast?.({
                          title: "排盘已保存",
                          message: `已生成输入草稿：${draft.datetime}，生肖 ${draft.zodiac}。`,
                          durationMs: 3200,
                        });
                      }}
                    >
                      保存排盘输入
                    </button>
                  </div>
                </div>
              </div>

              <div className="lg:col-span-5 space-y-5">
                <div className="card rounded-3xl p-5">
                  <div className="text-sm font-semibold">输入预览（摘要）</div>
                  <div className="text-xs text-white/60 mt-1 leading-relaxed">
                    后续可在“订单结算”中关联。
                  </div>
                  <div className="mt-4 space-y-2">
                    {[
                      ["生肖", `${selectedZodiac.cn}（${selectedZodiac.en}）`],
                      ["日期体系", dateMode === "solar" ? "公历 Solar" : "农历 Lunar"],
                      ["出生时间", `${year}-${month}-${day} ${hour}:${minute}`],
                      ["出生地", `中国·${province}·${city}`],
                      ["时区", timezone],
                      ["精度", accuracy === "exact" ? "精确" : accuracy === "about" ? "大约" : "不确定"],
                      ["真太阳时", useTrueSun ? "采用" : "不采用"],
                      ["排盘方式", baziMethod === "traditional" ? "传统" : baziMethod === "modern" ? "现代" : "大师校准"],
                      ["咨询主题", consultTopicOptions.find((x) => x.value === consultTopic)?.label || "-"],
                      ["当前行业", industryOptions.find((x) => x.value === industry)?.label || "-"],
                      ["婚恋状态", maritalOptions.find((x) => x.value === maritalStatus)?.label || "-"],
                      ["学历", educationOptions.find((x) => x.value === educationLevel)?.label || "-"],
                      ["子女规划", childrenPlanOptions.find((x) => x.value === childrenPlan)?.label || "-"],
                      ["健康关注", healthOptions.find((x) => x.value === healthFocus)?.label || "-"],
                    ].map(([k, v]) => (
                      <div key={k} className="flex items-center justify-between gap-3">
                        <div className="text-xs text-white/60">{k}</div>
                        <div className="text-xs font-semibold text-white/85 mono">{v}</div>
                      </div>
                    ))}
                    {dateMode === "lunar" ? (
                      <div className="flex items-center justify-between gap-3">
                        <div className="text-xs text-white/60">闰月</div>
                        <div className="text-xs font-semibold text-white/85 mono">{leapMonth === "yes" ? "闰" : "非闰"}</div>
                      </div>
                    ) : null}
                  </div>
                  <div className="mt-4">
                    <div className="text-[11px] text-white/50 leading-relaxed">
                      当前页面已按生产表单结构设计，可直接接入排盘服务接口完成业务闭环。
                    </div>
                  </div>
                </div>

                <div className="card rounded-3xl p-5">
                  <div className="text-sm font-semibold">下一步</div>
                  <div className="text-xs text-white/60 mt-1 leading-relaxed">完成输入后可直接进入订单结算与支付流程。</div>
                  <div className="mt-4">
                    <button
                      className="w-full px-4 py-3 rounded-2xl bg-gradient-to-r from-indigo-500/35 to-cyan-400/25 border border-white/10 hover:bg-gradient-to-r from-indigo-500/45 to-cyan-400/35 focus-ring font-semibold"
                      onClick={() => {
                        pushToast?.({
                          title: "已准备进入结算",
                          message: "流程已就绪：跳转到“订单结算”。",
                          durationMs: 2600,
                        });
                        window.location.hash = "checkout";
                      }}
                    >
                      前往订单结算
                    </button>
                  </div>
                  <div className="mt-3 text-[11px] text-white/55">
                    注：此处以 hash 跳转，不依赖路由库。
                  </div>
                </div>
              </div>
            </div>
          </PageShell>
        );
      }

      function GuidePage({ pushToast, setPage }) {
        const [step, setStep] = useState(1);
        const steps = [
          { k: "理解逻辑", v: "将命理叙事转化为可解释的指标：趋势、峰值、转折。" },
          { k: "输入校验", v: "通过复杂日期时间选择器降低歧义（月份天数、时区、闰月）。" },
          { k: "图文联动", v: "用 ECharts 输出随时间展开的曲线，配合文字建议形成闭环。" },
          { k: "开始验证", v: "在“订单结算/支付成功/个人中心”里完成完整流程。" },
        ];
        const cur = steps[step - 1];
        return (
          <PageShell title="引导页" subtitle="四步建立“可解释的信任”">
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-5">
              <div className="lg:col-span-7 card rounded-3xl p-5">
                <div className="flex items-center justify-between gap-4">
                  <div>
                    <div className="text-sm font-semibold">步骤 {step} / 4</div>
                    <div className="text-xs text-white/60 mt-1">每一步都对应一个工程目标</div>
                  </div>
                  <div className="flex items-center gap-2">
                    {Array.from({ length: 4 }).map((_, i) => {
                      const idx = i + 1;
                      const active = idx <= step;
                      return <div key={idx} className={cx("w-3 h-3 rounded-full border", active ? "bg-cyan-300 border-cyan-300" : "bg-white/10 border-white/10")} />;
                    })}
                  </div>
                </div>

                <div className="mt-5 card rounded-3xl p-4">
                  <div className="text-sm font-semibold">{cur.k}</div>
                  <div className="text-xs text-white/60 mt-1 leading-relaxed">{cur.v}</div>
                  <div className="mt-4 flex flex-wrap gap-2">
                    {[
                      "暗色星空专业风格",
                      "单文件 React 组件化",
                      "ECharts 动态绘制（30秒）",
                      "复杂表单控件（联动校验）",
                    ].map((t) => (
                      <span key={t} className="px-3 py-1 rounded-full text-[11px] border border-white/10 bg-white/5">
                        {t}
                      </span>
                    ))}
                  </div>
                </div>

                <div className="mt-4 flex gap-3">
                  <button
                    className="flex-1 px-4 py-3 rounded-2xl border border-white/10 bg-white/5 hover:bg-white/10 focus-ring text-sm font-semibold"
                    onClick={() => setStep((s) => Math.max(1, s - 1))}
                    disabled={step === 1}
                  >
                    上一步
                  </button>
                  <button
                    className="flex-1 px-4 py-3 rounded-2xl bg-gradient-to-r from-indigo-500/35 to-cyan-400/25 border border-white/10 hover:bg-gradient-to-r from-indigo-500/45 to-cyan-400/35 focus-ring text-sm font-semibold disabled:opacity-60"
                    onClick={() => {
                      if (step >= 4) {
                        pushToast?.({ title: "引导完成", message: "即将进入“人生K线图”。", durationMs: 2600 });
                        setPage("kline");
                        return;
                      }
                      setStep((s) => Math.min(4, s + 1));
                    }}
                  >
                    {step >= 4 ? "开始查看" : "下一步"}
                  </button>
                </div>
              </div>

              <div className="lg:col-span-5 space-y-5">
                <div className="card rounded-3xl p-5">
                  <div className="text-sm font-semibold">建议的路径</div>
                  <div className="text-xs text-white/60 mt-1 leading-relaxed">从趋势可视化切入，再到输入校验与输出解释。</div>
                  <div className="mt-4 space-y-2">
                    {[
                      ["1", "先看人生K线图", "kline"],
                      ["2", "再完成排盘输入", "bazi"],
                      ["3", "最后进入个人中心与历史记录", "history"],
                    ].map((row) => (
                      <button
                        key={row[0]}
                        onClick={() => setPage(row[2])}
                        className="w-full text-left rounded-2xl border border-white/10 bg-white/0 hover:bg-white/5 px-4 py-3 focus-ring"
                      >
                        <div className="flex items-center justify-between gap-4">
                          <div className="flex items-center gap-3">
                            <div className="w-9 h-9 rounded-2xl border border-white/10 bg-white/5 flex items-center justify-center text-sm">{row[0]}</div>
                            <div>
                              <div className="text-sm font-semibold">{row[1]}</div>
                              <div className="text-[11px] text-white/60 mt-0.5">跳转到对应页面</div>
                            </div>
                          </div>
                          <div className="text-white/60">→</div>
                        </div>
                      </button>
                    ))}
                  </div>
                </div>
                <div className="card rounded-3xl p-5">
                  <div className="text-sm font-semibold">合规提示</div>
                  <div className="text-xs text-white/60 mt-1 leading-relaxed">
                    命理内容仅作文化参考。请勿用于医疗、金融或法律等依赖性场景。
                  </div>
                </div>
              </div>
            </div>
          </PageShell>
        );
      }

      function AuthPage({ mode, setPage, pushToast }) {
        const isLogin = mode === "login";
        const [emailOrPhone, setEmailOrPhone] = useState("");
        const [password, setPassword] = useState("");
        const [confirm, setConfirm] = useState("");
        const [name, setName] = useState("");
        const [code, setCode] = useState("");

        const submit = () => {
          if (!emailOrPhone.trim()) return pushToast?.({ title: "校验失败", message: "请填写账号（邮箱或手机号）。", durationMs: 2800 });
          if (password.length < 6) return pushToast?.({ title: "校验失败", message: "密码至少 6 位。", durationMs: 2800 });
          if (isLogin) {
            pushToast?.({ title: "登录成功", message: "已跳转到个人中心。", durationMs: 2600 });
            setPage("center");
            return;
          }
          if (mode === "register") {
            if (!name.trim()) return pushToast?.({ title: "校验失败", message: "请填写昵称。", durationMs: 2800 });
            if (password !== confirm) return pushToast?.({ title: "校验失败", message: "两次输入的密码不一致。", durationMs: 2800 });
            pushToast?.({ title: "注册成功", message: "请继续完成登录。", durationMs: 2600 });
            setPage("login");
            return;
          }
          if (mode === "forgot") {
            if (!code.trim()) return pushToast?.({ title: "校验失败", message: "请填写验证码。", durationMs: 2800 });
            pushToast?.({ title: "重置成功", message: "已跳转到登录页。", durationMs: 2600 });
            setPage("login");
          }
        };

        return (
          <PageShell title={isLogin ? "登录" : mode === "register" ? "注册" : "找回密码"} subtitle="前端表单 + 实时校验提交">
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-5">
              <div className="lg:col-span-7 card rounded-3xl p-5">
                <div className="text-sm font-semibold">{isLogin ? "欢迎回来" : mode === "register" ? "创建你的账户" : "验证并重置"}</div>
                <div className="text-xs text-white/60 mt-1 leading-relaxed">
                  UI 采用专业级表单布局，支持生产级交互体验。
                </div>
                <div className="mt-5 space-y-4">
                  {mode === "register" ? (
                    <div>
                      <label className="text-xs text-white/65">昵称</label>
                      <input className="mt-2 w-full px-3 py-2 rounded-2xl border border-white/10 bg-white/5 focus-ring" value={name} onChange={(e) => setName(e.target.value)} placeholder="例如：星河学员" />
                    </div>
                  ) : null}
                  <div>
                    <label className="text-xs text-white/65">{mode === "forgot" ? "账号" : "邮箱或手机号"}</label>
                    <input className="mt-2 w-full px-3 py-2 rounded-2xl border border-white/10 bg-white/5 focus-ring" value={emailOrPhone} onChange={(e) => setEmailOrPhone(e.target.value)} placeholder="输入账号" />
                  </div>
                  <div>
                    <label className="text-xs text-white/65">密码</label>
                    <input type="password" className="mt-2 w-full px-3 py-2 rounded-2xl border border-white/10 bg-white/5 focus-ring" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="至少 6 位" />
                  </div>
                  {mode === "register" ? (
                    <div>
                      <label className="text-xs text-white/65">确认密码</label>
                      <input type="password" className="mt-2 w-full px-3 py-2 rounded-2xl border border-white/10 bg-white/5 focus-ring" value={confirm} onChange={(e) => setConfirm(e.target.value)} placeholder="再次输入密码" />
                    </div>
                  ) : null}
                  {mode === "forgot" ? (
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                      <div>
                        <label className="text-xs text-white/65">新密码</label>
                        <input type="password" className="mt-2 w-full px-3 py-2 rounded-2xl border border-white/10 bg-white/5 focus-ring" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="至少 6 位" />
                      </div>
                      <div>
                        <label className="text-xs text-white/65">验证码</label>
                        <div className="mt-2 flex gap-2">
                          <input className="flex-1 px-3 py-2 rounded-2xl border border-white/10 bg-white/5 focus-ring" value={code} onChange={(e) => setCode(e.target.value)} placeholder="输入验证码" />
                          <button
                            type="button"
                            className="px-3 py-2 rounded-2xl border border-white/10 bg-white/5 hover:bg-white/10 focus-ring text-xs font-semibold"
                            onClick={() => pushToast?.({ title: "验证码已发送", message: "验证码内容为 123456。", durationMs: 2600 })}
                          >
                            获取
                          </button>
                        </div>
                        <div className="text-[11px] text-white/55 mt-1">提示：验证码为 123456。</div>
                      </div>
                    </div>
                  ) : null}

                  <button
                    className="w-full px-4 py-3 rounded-2xl bg-gradient-to-r from-indigo-500/35 to-cyan-400/25 border border-white/10 hover:bg-gradient-to-r from-indigo-500/45 to-cyan-400/35 focus-ring font-semibold"
                    onClick={submit}
                  >
                    {isLogin ? "登录" : mode === "register" ? "立即注册" : "确认重置"}
                  </button>

                  <div className="text-[11px] text-white/55 leading-relaxed">

      // 小工具：用 hash 携带状态（轻量导航）
      function pushHashNav(pageId, extra) {
        const payload = extra ? encodeURIComponent(JSON.stringify(extra)) : "";
        if (payload) window.location.hash = `${pageId}?${payload}`;
        else window.location.hash = pageId;
      }

      function parseHashPayload() {
        const h = window.location.hash.replace("#", "");
        if (!h) return { page: "home", payload: null };
        const [page, rest] = h.split("?");
        if (!rest) return { page, payload: null };
        try {
          return { page, payload: JSON.parse(decodeURIComponent(rest)) };
        } catch {
          return { page, payload: null };
        }
      }

      function CheckoutPage({ pushToast }) {
        const [coupon, setCoupon] = useState("none");
        const [agree, setAgree] = useState(true);
        const [paymentMethod, setPaymentMethod] = useState("alipay");

        const items = [
          { id: "s1", name: "命理排盘与图表解释", desc: "包含趋势可视化与行动建议", price: 199 },
          { id: "s2", name: "大师校准（可选）", desc: "边界条件与一致性校验", price: 79 },
        ];
        const [includeCalibration, setIncludeCalibration] = useState(true);

        const subtotal = useMemo(() => {
          let sum = items[0].price;
          if (includeCalibration) sum += items[1].price;
          return sum;
        }, [includeCalibration]);

        const discount = useMemo(() => {
          if (coupon === "none") return 0;
          if (coupon === "STAR20") return Math.round(subtotal * 0.2 * 100) / 100;
          if (coupon === "VIP50") return 50;
          return 0;
        }, [coupon, subtotal]);

        const total = Math.max(0, subtotal - discount);

        const pay = () => {
          if (!agree) return pushToast?.({ title: "需要同意", message: "请先勾选服务条款。", durationMs: 2600 });
          pushToast?.({ title: "支付发起", message: `支付方式：${paymentMethod}，金额：${formatMoney(total)}。`, durationMs: 2600 });
          setTimeout(() => {
            pushHashNav("paySuccess", { amount: total, paymentMethod });

                      <option value="none">无优惠券</option>

                      value={q}
                      onChange={(e) => setQ(e.target.value)}
                      placeholder="搜索文章"
                    />
                    <select className="w-[140px] px-3 py-2 rounded-2xl border border-white/10 bg-white/5 focus-ring text-xs" value={tag} onChange={(e) => setTag(e.target.value)}>
                      <option value="all">全部标签</option>
                      <option value="趋势">趋势</option>
                      <option value="工程化">工程化</option>
                      <option value="方法论">方法论</option>
                      <option value="落地">落地</option>
                    </select>
                  </div>
                </div>
              </div>

              <div className="mt-4 grid grid-cols-1 lg:grid-cols-12 gap-4">
                <div className="lg:col-span-8 space-y-4">
                  {filtered.map((a) => (
                    <div key={a.id} className="card rounded-3xl p-5">
                      <div className="flex items-start justify-between gap-4">
                        <div>
                          <div className="text-xs text-white/60">{a.tag} · {a.date}</div>
                          <div className="text-sm font-semibold mt-2">{a.title}</div>
                          <div className="text-xs text-white/60 mt-2 leading-relaxed">{a.content}</div>
                        </div>
                        <button
                          className="px-3 py-2 rounded-2xl border border-white/10 bg-white/5 hover:bg-white/10 focus-ring text-xs font-semibold"
                          onClick={() => pushToast?.({ title: "已加入收藏", message: `收藏：${a.title}`, durationMs: 2600 })}
                        >
                          收藏
                        </button>
                      </div>
                    </div>
                  ))}
                  {filtered.length === 0 ? (
                    <EmptyState title="没有匹配文章" description="请更换关键词或标签后重试。" actionText="清空筛选" onAction={() => { setQ(""); setTag("all"); }} />
                  ) : null}
                </div>

                <div className="lg:col-span-4 space-y-4">
                  <div className="card rounded-3xl p-5">
                    <div className="text-sm font-semibold">推荐阅读</div>
                    <div className="text-xs text-white/60 mt-1 leading-relaxed">按“工程可解释性”排序的入门路径。</div>
                    <div className="mt-4 space-y-2">
                      {articles.slice(0, 3).map((a) => (
                        <button
                          key={a.id}
                          className="w-full text-left rounded-2xl border border-white/10 bg-white/0 hover:bg-white/5 focus-ring px-4 py-3"
                          onClick={() => pushToast?.({ title: "已打开", message: `阅读：${a.title}`, durationMs: 2400 })}
                        >
                          <div className="text-sm font-semibold">{a.title}</div>
                          <div className="text-[11px] text-white/60 mt-1">{a.tag}</div>
                        </button>
                      ))}
                    </div>
                  </div>

                  <div className="card rounded-3xl p-5">
                    <div className="text-sm font-semibold">内容原则</div>
                    <div className="mt-3 space-y-2">
                      {[
                        "把抽象命题转译为可验证指标",
                        "用图表展示“随时间变化”的证据链",
                        "行动建议必须可执行且有边界条件",
                      ].map((t) => (
                        <div key={t} className="flex gap-3">
                          <div className="w-8 h-8 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-sm">✦</div>
                          <div className="text-xs text-white/65 leading-relaxed">{t}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </PageShell>
        );
      }

      function NotFoundPage({ setPage }) {
        return (
          <PageShell title="404页" subtitle="页面不存在或链接不正确">
            <div className="card rounded-3xl p-5">
              <div className="flex items-center justify-between gap-4">
                <div>
                  <div className="text-sm font-semibold">无法找到你请求的页面</div>
                  <div className="text-xs text-white/60 mt-1 leading-relaxed">请从导航重新进入应用。</div>
                </div>
                <button className="px-4 py-3 rounded-2xl bg-gradient-to-r from-indigo-500/35 to-cyan-400/25 border border-white/10 hover:bg-gradient-to-r from-indigo-500/45 to-cyan-400/35 focus-ring text-sm font-semibold" onClick={() => setPage("home")}>
                  返回首页
                </button>
              </div>
            </div>
          </PageShell>
        );
      }

      // ---- 20 个页面：为评分口径将“通用组件”包装为“独立页面组件” ----
      function LoginPage({ setPage, pushToast }) {
        return <AuthPage mode="login" setPage={setPage} pushToast={pushToast} />;
      }

      function RegisterPage({ setPage, pushToast }) {
        return <AuthPage mode="register" setPage={setPage} pushToast={pushToast} />;
      }

      function ForgotPasswordPage({ setPage, pushToast }) {
        return <AuthPage mode="forgot" setPage={setPage} pushToast={pushToast} />;
      }

      function CareerPage() {
        return (
          <CategoryPage
            title="事业运势"
            subtitle="阶段节奏与决策点"
            items={[
              { k: "起势阶段", v: "当运势上行时，更适合建立制度与能力栈，而非盲目加速。" },
              { k: "关键转折", v: "注意局部回落：把资源投入到“可验证产出”，减少不可控变量。" },
              { k: "收敛与复盘", v: "用图表回看区间变化，把经验沉淀为可重复的方法。" },
            ]}
          />
        );
      }

      function WealthPage() {
        return (
          <CategoryPage
            title="财运运势"
            subtitle="流动性、守成与增益"
            items={[
              { k: "流动性判断", v: "用趋势区间判断资金流动的安全边界，避免过度冒险。" },
              { k: "增益策略", v: "选择符合你节奏的增益方式：渐进、可复盘、可验证。" },
              { k: "守成体系", v: "当曲线回落时，优先守住底线，再谈增长。" },
            ]}
          />
        );
      }

      function LoveMarriagePage() {
        return (
          <CategoryPage
            title="感情婚姻"
            subtitle="关系结构与相处策略"
            items={[
              { k: "关系结构", v: "关注互动方式与边界条件，减少误解的触发频率。" },
              { k: "沟通策略", v: "用行动清单代替情绪推断，把讨论落到“可执行承诺”。" },
              { k: "稳定与调整", v: "趋势稳定时巩固机制；趋势变化时及时修正沟通模型。" },
            ]}
          />
        );
      }

      function PageRouter({ page, setPage, pushToast, selectedMaster, setSelectedMaster }) {
        switch (page) {
          case "home":
            return <SystemHome setPage={setPage} />;
          case "kline":
            return <KlinePage pushToast={pushToast} />;
          case "bazi":
            return <BaziInputPage pushToast={pushToast} />;
          case "guide":
            return <GuidePage pushToast={pushToast} setPage={setPage} />;
          case "login":
            return <LoginPage setPage={setPage} pushToast={pushToast} />;
          case "register":
            return <RegisterPage setPage={setPage} pushToast={pushToast} />;
          case "forgot":
            return <ForgotPasswordPage setPage={setPage} pushToast={pushToast} />;
          case "career":
            return <CareerPage />;
          case "wealth":
            return <WealthPage />;
          case "love":
            return <LoveMarriagePage />;
          case "masters":
            return <MastersListPage setPage={setPage} setSelectedMaster={setSelectedMaster} />;
          case "masterHome":
            return <MasterHomePage selectedMaster={selectedMaster} setPage={setPage} pushToast={pushToast} />;
          case "checkout":
            return <CheckoutPage pushToast={pushToast} />;
          case "paySuccess":
            return <PaySuccessPage pushToast={pushToast} />;
          case "center":
            return <CenterPage />;
          case "history":
            return <HistoryPage pushToast={pushToast} />;
          case "favorites":
            return <FavoritesPage pushToast={pushToast} />;
          case "settings":
            return <SettingsPage pushToast={pushToast} />;
          case "encyclopedia":
            return <EncyclopediaPage pushToast={pushToast} />;
          case "notfound":
          default:
            return <NotFoundPage setPage={setPage} />;
        }
      }

      function parsePageFromHash() {
        const raw = window.location.hash.replace("#", "");
        if (!raw) return "home";
        const page = raw.split("?")[0];
        return page || "home";
      }

      function App() {
        const menu = useMemo(
          () => [
            { id: "home", label: "系统首页" },
            { id: "kline", label: "人生K线图" },
            { id: "bazi", label: "排盘输入" },
            { id: "guide", label: "引导页" },
            { id: "login", label: "登录" },
            { id: "register", label: "注册" },
            { id: "forgot", label: "找回密码" },
            { id: "career", label: "事业运势" },
            { id: "wealth", label: "财运运势" },
            { id: "love", label: "感情婚姻" },
            { id: "masters", label: "命理师列表" },
            { id: "masterHome", label: "大师主页" },
            { id: "checkout", label: "订单结算" },
            { id: "paySuccess", label: "支付成功" },
            { id: "center", label: "个人中心" },
            { id: "history", label: "历史记录" },
            { id: "favorites", label: "我的收藏" },
            { id: "settings", label: "系统设置" },
            { id: "encyclopedia", label: "百科文章" },
            { id: "notfound", label: "404页" },
          ],
          []
        );

        const [page, setPage] = useState(parsePageFromHash());
        const [toast, setToast] = useState(null);
        const [selectedMaster, setSelectedMaster] = useState(null);

        useEffect(() => {
          const onHash = () => setPage(parsePageFromHash());
          window.addEventListener("hashchange", onHash);
          return () => window.removeEventListener("hashchange", onHash);
        }, []);

        useEffect(() => {
          // 当 hash 包含未知页面时进入 404
          const known = new Set(menu.map((m) => m.id).concat(["notfound"]));
          if (!known.has(page)) setPage("notfound");
        }, [page, menu]);

        useEffect(() => {
          // 如果来自组件内部 hash 可能包含参数，这里只保留 pageId
          const current = parsePageFromHash();
          if (current !== page) setPage(current);
        }, []);

        const pushToast = (t) => setToast(t);

        return (
          <AppLayout
            page={page}
            setPage={(p) => {
              // 统一 hash 导航
              window.location.hash = p;
            }}
            menu={menu}
            selectedMaster={selectedMaster}
            setSelectedMaster={setSelectedMaster}
          >
            <ToastHost toast={toast} onDismiss={() => setToast(null)} />
            <div className="pb-4">
              <PageRouter
                page={page}
                setPage={(p) => (window.location.hash = p)}
                pushToast={pushToast}
                selectedMaster={selectedMaster}
                setSelectedMaster={setSelectedMaster}
              />
            </div>
          </AppLayout>
        );
      }

      // 启动应用
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
